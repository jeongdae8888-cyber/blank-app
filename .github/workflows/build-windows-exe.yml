name: Build AX4U Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - "ax4u_viewer.py"
      - "requirements.txt"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows EXE
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "AX4U_교통사고_영상판독기" `
            --collect-all PySide6 `
            --collect-all cv2 `
            --hidden-import numpy `
            ax4u_viewer.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AX4U-Windows-EXE
          path: dist/AX4U_교통사고_영상판독기.exe
          if-no-files-found: error
